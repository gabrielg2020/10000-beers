services:
  postgres:
    image: postgres:16-alpine
    container_name: beers-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: beers
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beers_dev_password}
      POSTGRES_DB: beers
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - beers-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U beers']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: beers-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - '5050:80'
    networks:
      - beers-network
    depends_on:
      - postgres

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beers-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://beers:${POSTGRES_PASSWORD:-beers_dev_password}@postgres:5432/beers
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./src:/app/src:ro
      - images:/data/images
      - wwebjs-auth:/app/.wwebjs_auth
      - wwebjs-cache:/app/.wwebjs_cache
    networks:
      - beers-network
    depends_on:
      postgres:
        condition: service_healthy
    # Uncomment for development with hot reload
    # command: npm run dev

volumes:
  pgdata:
    driver: local
  pgadmin-data:
    driver: local
  images:
    driver: local
  wwebjs-auth:
    driver: local
  wwebjs-cache:
    driver: local

networks:
  beers-network:
    driver: bridge
